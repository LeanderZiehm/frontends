<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JSON Schema Generator</title>
 <img src="https://pix.leanderziehm.com/frontends-json-schema-index-html">
<style>
  body { font-family: sans-serif; margin: 20px; background: #f4f4f4; }
  textarea { width: 100%; height: 200px; font-family: monospace; font-size: 14px; }
  pre { background: #fff; padding: 10px; overflow: auto; max-height: 500px; border: 1px solid #ccc; }
  h2 { margin-top: 20px; }
  label { margin-right: 10px; }
  button { margin-left: 10px; }
  input[type=number] { width: 50px; }
</style>
</head>
<body>
<h1>JSON Schema Generator</h1>

<textarea id="jsonInput" placeholder="Paste your JSON here..."></textarea>

<div style="margin-top:10px;">
  <label><input type="checkbox" id="showValues"> Show actual values instead of schema types</label>
  <label>Array repetitions: <input type="number" id="repLimit" value="3" min="1"></label>
  <button id="copyBtn">Copy Output</button>
</div>

<h2>Output</h2>
<pre id="schemaOutput"></pre>

<script>
function getType(value) {
  if (value === null) return "null";
  if (Array.isArray(value)) return "array";
  return typeof value;
}

function generateSchema(value, depth = 0, repLimit = 3, showValues = false) {
  if (depth > 100) return "..."; // prevent too deep recursion
  if (value === null) return showValues ? null : "null";
  if (Array.isArray(value)) {
    if (value.length === 0) return [];
    const result = [];
    const limit = Math.min(repLimit, value.length);
    for (let i = 0; i < limit; i++) {
      result.push(generateSchema(value[i], depth + 1, repLimit, showValues));
    }
    if (value.length > repLimit) result.push("...");
    return result;
  }
  if (typeof value === "object") {
    const obj = {};
    for (const key in value) {
      obj[key] = generateSchema(value[key], depth + 1, repLimit, showValues);
    }
    return obj;
  }
  return showValues ? value : getType(value);
}

function updateOutput() {
  const input = document.getElementById("jsonInput").value;
  const repLimit = parseInt(document.getElementById("repLimit").value) || 3;
  const showValues = document.getElementById("showValues").checked;
  try {
    const parsed = JSON.parse(input);
    const schema = generateSchema(parsed, 0, repLimit, showValues);
    document.getElementById("schemaOutput").textContent = JSON.stringify(schema, null, 2);
  } catch (e) {
    document.getElementById("schemaOutput").textContent = "Invalid JSON";
  }
}

// Auto-update on input/change
document.getElementById("jsonInput").addEventListener("input", updateOutput);
document.getElementById("showValues").addEventListener("change", updateOutput);
document.getElementById("repLimit").addEventListener("input", updateOutput);

// Copy to clipboard
document.getElementById("copyBtn").addEventListener("click", () => {
  const output = document.getElementById("schemaOutput").textContent;
  navigator.clipboard.writeText(output).then(() => {
    alert("Copied to clipboard!");
  });
});

// Initial update
updateOutput();
</script>
</body>
</html>
