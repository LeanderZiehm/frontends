<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Question Bank</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: #e2e8f0;
}

header {
    padding: 20px;
    background: #111827;
    position: sticky;
    top: 0;
    border-bottom: 1px solid #334155;
}

input {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: #1f2937;
    border: 1px solid #334155;
    color: white;
    border-radius: 6px;
}

.container {
    padding: 20px;
}

.topic {
    margin-bottom: 16px;
    border: 1px solid #334155;
    border-radius: 8px;
    overflow: hidden;
}

.topic h3 {
    margin: 0;
    padding: 10px;
    background: #1f2937;
}

.q {
    padding: 10px;
    border-top: 1px solid #223;
    cursor: pointer;
}

.q:hover {
    background: #0b1220;
    border-left: 3px solid #38bdf8;
}
</style>
</head>

<body>

<header>
    <h1>Wireless Networking Questions</h1>
    <input id="search" placeholder="Search questions..." />
</header>

<div class="container" id="app"></div>

<script>
const data = {
    radio_signals: [
        "Noiseless vs noisy channel",
        "Max bit rate calculation",
        "Shannon capacity"
    ],
    medium_access: [
        "Why MAC fails in wireless",
        "Hidden/exposed terminal",
        "ALOHA vs CSMA"
    ]
};


const app = document.getElementById("app");

function render(filter="") {
    app.innerHTML = "";

    Object.entries(data).forEach(([topic, qs]) => {

        const filtered = qs.filter(q =>
            q.toLowerCase().includes(filter.toLowerCase())
        );

        if (filter && filtered.length === 0) return;

        const box = document.createElement("div");
        box.className = "topic";

        box.innerHTML = `<h3>${topic}</h3>`;

        filtered.forEach((q, i) => {
            const div = document.createElement("div");
            div.className = "q";
            div.textContent = q;

            div.onclick = () => {
                const id = `${topic}_${i}`;
                window.location = `exercise.html?id=${id}&q=${encodeURIComponent(q)}`;
            };

            box.appendChild(div);
        });

        app.appendChild(box);
    });
}

document.getElementById("search").oninput = e =>
    render(e.target.value);

render();
</script>

</body>
</html>
