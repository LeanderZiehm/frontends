const app = document.getElementById("app");

function render(filter="") {
    app.innerHTML = "";

    Object.entries(data).forEach(([topic, qs]) => {

        const filtered = qs.filter(q =>
            q.toLowerCase().includes(filter.toLowerCase())
        );

        if (filter && filtered.length === 0) return;

        const box = document.createElement("div");
        box.className = "topic";

        box.innerHTML = `<h3>${topic}</h3>`;

        filtered.forEach((q, i) => {
            const div = document.createElement("div");
            div.className = "q";
            div.textContent = q;

            div.onclick = () => {
                const id = `${topic}_${i}`;
                window.location = `exercise.html?id=${id}&q=${encodeURIComponent(q)}`;
            };

            box.appendChild(div);
        });

        app.appendChild(box);
    });
}

document.getElementById("search").oninput = e =>
    render(e.target.value);

render();
