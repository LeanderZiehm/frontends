<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Measurements</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 16px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 8px;
      border: none;
      margin-bottom: 16px;
      background: #1e293b;
      color: #e5e7eb;
    }

    canvas {
      background: #020617;
      border-radius: 12px;
      padding: 8px;
    }
    .chart-wrapper {
  position: relative;
  width: 100%;
  height: 320px;   /* 👈 mobile-friendly height */
}

  </style>
</head>
<body>
  
  <div class="navbar" style="background-color: #000000; width: 100vw; padding: 15px; " > 
    <a href="./" style="color: rgb(255, 255, 255); border: solid 1px rgb(255, 255, 255); border-radius: 5px; padding: 5px; background-color: #ffffff27; text-decoration: none"  >Input</a>
    <a href="./charts" style="color: rgb(255, 255, 255); border: solid 1px rgb(255, 255, 255); border-radius: 5px; padding: 5px; background-color: #00000018; text-decoration: none"  >Charts</a>
  </div>
  
  <div class="container">
    <select id="typeSelect"></select>
   <div class="chart-wrapper">
  <canvas id="chart"></canvas>
</div>
  </div>

 <script>
  const API_URL = "https://tracker-api.leanderziehm.com/measurements?limit=100";

const select = document.getElementById("typeSelect");
const ctx = document.getElementById("chart");

let chart;
let measurements = [];

fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    measurements = data.sort(
      (a, b) => new Date(a.created_at) - new Date(b.created_at)
    );

    const types = [...new Set(measurements.map(m => m.text))];

    // populate dropdown
    types.forEach(type => {
      const opt = document.createElement("option");
      opt.value = type;
      opt.textContent = type;
      select.appendChild(opt);
    });

    renderChart(types[0]);
  });

select.addEventListener("change", e => {
  renderChart(e.target.value);
});

function renderChart(type) {
  const filtered = measurements.filter(m => m.text === type);

  const labels = filtered.map(m =>
    new Date(m.created_at).toLocaleDateString()
  );
  const values = filtered.map(m => m.value);

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [
        {
          label: type,
          data: values,
          borderColor: "#38bdf8",
          backgroundColor: "rgba(56, 189, 248, 0.15)",
          fill: true,
          tension: 0.35,
          pointRadius: 4,
          pointBackgroundColor: "#38bdf8"
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      aspectRatio: 1.2,
      plugins: {
        legend: {
          labels: {
            color: "#e5e7eb"
          }
        }
      },
      scales: {
        x: {
          ticks: { color: "#94a3b8" },
          grid: { color: "#1e293b" }
        },
        y: {
          ticks: { color: "#94a3b8" },
          grid: { color: "#1e293b" }
        }
      }
    }
  });
}

 </script>
</body>
</html>
