<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Previewer</title>
   <img src="https://pix.leanderziehm.com/frontends-htmlpreview">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }
    body {
      display: flex;
      flex-direction: column;
      font-family: sans-serif;
    }
    textarea {
      flex: 1;
      width: 100%;
      box-sizing: border-box;
      font-family: monospace;
      font-size: 14px;
      padding: 1rem;
      border: 2px solid #444;
      background: #1e1e1e;
      color: #dcdcdc;
    }
    button {
      padding: 1rem;
      border: none;
      background: #0078d7;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #005fa1;
    }
  </style>
</head>
<body>

  <textarea id="htmlInput" placeholder="Paste HTML here..."></textarea>
  <button id="previewBtn">Submit &gt;&gt; Preview</button>

  <script>

    document.getElementById("htmlInput").addEventListener("input",clickButton);
    document.getElementById("previewBtn").addEventListener("click",clickButton);

 function clickButton() {
  const userHtml = document.getElementById("htmlInput").value.trim();

  if (userHtml.length === 0) {
    alert("Paste some HTML first!");
    return;
  }

  // 1. Must contain at least one HTML tag
  if (!/<[^>]+>/.test(userHtml)) {
    alert("That doesn't look like HTML (no tags found).");
    return;
  }

  // 2. Basic tag structure check (opening + closing)
  if (!/<\/?[a-z][\s\S]*>/i.test(userHtml)) {
    alert("Invalid HTML tag structure.");
    return;
  }

  // 3. Optional: warn if no <html> or <body> tag
  if (!/<(html|body)[\s>]/i.test(userHtml)) {
    const proceed = confirm(
      "No <html> or <body> tag found. Preview anyway?"
    );
    if (!proceed) return;
  }

  // 4. Prevent script execution (optional but smart)
  if (/<script[\s>]/i.test(userHtml)) {
    const proceed = confirm(
      "This HTML contains <script> tags. Continue?"
    );
    if (!proceed) return;
  }

  // Replace entire document with the pasted HTML
  document.open();
  document.write(userHtml);
  document.close();
}

  </script>

</body>
</html>
